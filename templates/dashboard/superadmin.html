<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .header {
            background: #502d7d;
            color: white;
            padding: 15px 30px;
        }

        .container {
            padding: 30px;
        }

        .btn {
            background: #502d7d;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 400px;
            margin: 100px auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>GinnieFlow - Super Admin</h2>
</div>

<div class="container">

    <h3>Welcome, {{ request.user.username }}</h3>

    <button class="btn" onclick="openModal('addModal')">+ Add Tenant</button>

    <div class="card">
        <h3>Tenants</h3>

        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>

            {% for tenant in tenants %}
            <tr>
                <td>{{ tenant.name }}</td>
                <td>{{ tenant.email }}</td>
                <td>
                    <button class="btn"
                        onclick="openEditModal('{{ tenant.id }}','{{ tenant.name }}','{{ tenant.email }}')">
                        Edit
                    </button>

                    <form method="POST" action="{% url 'delete-tenant' tenant.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn" style="background:red;"
                            onclick="return confirm('Are you sure you want to delete this tenant?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

<!-- ADD MODAL -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>Add Tenant</h3>

        <form method="POST" action="{% url 'add-tenant' %}">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Company Name"><br><br>
            <input type="email" name="email" placeholder="Email"><br><br>

            <button type="submit" class="btn">Create</button>
            <button type="button" onclick="closeModal('addModal')">Close</button>
        </form>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Tenant</h3>

        <form method="POST" id="editForm">
            {% csrf_token %}
            <input type="text" name="name" id="editName"><br><br>
            <input type="email" name="email" id="editEmail"><br><br>

            <button type="submit" class="btn">Update</button>
            <button type="button" onclick="closeModal('editModal')">Close</button>
        </form>
    </div>
</div>

<script>
function openModal(id){
    document.getElementById(id).style.display='block';
}

function closeModal(id){
    document.getElementById(id).style.display='none';
}

function openEditModal(id, name, email){
    document.getElementById('editModal').style.display='block';

    document.getElementById('editName').value = name;
    document.getElementById('editEmail').value = email;

    document.getElementById('editForm').action = "/accounts/update-tenant/" + id + "/";
}
</script>

</body>
</html>
